<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logyard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='white' d='M17.8,20C17.4,21.2 16.3,22 15,22H5C3.3,22 2,20.7 2,19V18H5L14.2,18C14.6,19.2 15.7,20 17,20H17.8M19,2C20.7,2 22,3.3 22,5V6H20V5C20,4.4 19.6,4 19,4C18.4,4 18,4.4 18,5V18H17C16.4,18 16,17.6 16,17V16H5V5C5,3.3 6.3,2 8,2H19M8,6V8H15V6H8M8,10V12H14V10H8Z'/%3E%3C/svg%3E">
  <script src="/static/htmx.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e0e0e0; font-family: "JetBrains Mono", "Fira Code", monospace; font-size: 13px; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #16213e; border-bottom: 1px solid #0f3460; }
    header h1 { font-size: 18px; display: flex; align-items: center; gap: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
    .icon-btn svg { width: 16px; height: 16px; fill: #e0e0e0; }
    .icon-btn:hover svg { fill: #e94560; }
    .gear-btn { margin-left: 8px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #4caf50; }
    .status-dot.refreshing { animation: pulse 1s ease-in-out; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .filters { display: flex; gap: 8px; padding: 10px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-wrap: wrap; align-items: center; }
    .filters select, .filters input[type="datetime-local"], .filters input[name="search"] { background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
    .filters select:focus, .filters input:focus { outline: none; border-color: #66ccff; }
    .filters .btn-filter { background: #0f3460; color: #66ccff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
    .filters .btn-filter:hover { background: #1a4a7a; }
    .filters .btn-reset { background: #333; color: #e0e0e0; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
    .filters .btn-reset:hover { background: #444; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead { position: sticky; top: 0; background: #16213e; z-index: 1; }
    th { text-align: left; padding: 8px 10px; border-bottom: 2px solid #0f3460; border-right: 1px solid #0f3460; font-weight: 600; color: #a0a0a0; font-size: 11px; text-transform: uppercase; position: relative; }
    th:last-child { border-right: none; }
    .col-resize { position: absolute; top: 0; right: -2px; width: 5px; height: 100%; cursor: col-resize; background: transparent; z-index: 2; }
    .col-resize:hover, .col-resize.active { background: #e94560; }
    td { padding: 4px 10px; border-bottom: 1px solid #0f3460; border-right: 1px solid rgba(15,52,96,0.3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    td:last-child { white-space: normal; border-right: none; }
    tr:hover { background: #16213e; }
    .sev-emerg, .sev-alert { background: #4a0000; color: #ff4444; }
    .sev-crit { background: #3a0000; color: #ff6666; }
    .sev-err { color: #ff8888; }
    .sev-warning { color: #ffcc00; }
    .sev-notice { color: #66ccff; }
    .sev-info { color: #e0e0e0; }
    .sev-debug { color: #888888; }

    /* Settings modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: flex-start; padding-top: 60px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; width: 700px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 20px; position: relative; }
    .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #a0a0a0; cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
    .modal-close:hover { color: #e94560; }
    .modal h2 { margin-bottom: 16px; font-size: 16px; color: #e0e0e0; }
    .modal h3 { margin: 16px 0 8px; font-size: 13px; color: #66ccff; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
    .modal label { display: block; margin: 6px 0 2px; font-size: 11px; color: #a0a0a0; text-transform: uppercase; }
    .modal input, .modal select { width: 100%; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; margin-bottom: 4px; }
    .modal input:focus, .modal select:focus { outline: none; border-color: #e94560; }
    /* Hide number input spinners */
    .modal input[type="number"] { -moz-appearance: textfield; }
    .modal input[type="number"]::-webkit-outer-spin-button,
    .modal input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 12px; border-top: 1px solid #0f3460; }
    .modal-actions button { padding: 8px 20px; border-radius: 4px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; }
    .btn-save { background: #0f3460; color: #66ccff; }
    .btn-save:hover { background: #1a4a7a; }
    .btn-cancel { background: #333; color: #e0e0e0; }
    .btn-cancel:hover { background: #444; }
    .rule-group { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; padding: 10px; margin-bottom: 8px; position: relative; }
    .rule-group .remove-btn { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #ff4444; cursor: pointer; font-size: 14px; }
    .rule-group .remove-btn:hover { color: #ff8888; }
    .add-btn { background: #0f3460; color: #66ccff; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 4px; }
    .add-btn:hover { background: #1a4a7a; }
    .field-row { display: flex; gap: 8px; }
    .field-row > div { flex: 1; }
    /* Checkbox styled to match section header color */
    .modal input[type="checkbox"] { width: 14px !important; height: 14px !important; min-width: 14px; margin: 0; padding: 0; -webkit-appearance: none; -moz-appearance: none; appearance: none; border: 1px solid #0f3460; border-radius: 2px; background: #0f3460; cursor: pointer; position: relative; display: inline-block; vertical-align: middle; flex-shrink: 0; }
    .modal input[type="checkbox"]:checked { background: #0f3460; }
    .modal input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 4px; height: 8px; border: solid #66ccff; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  </style>
</head>
<body>
  <header>
    <h1>
      <span class="status-dot" id="status-dot"></span>Logyard
    </h1>
    <button class="icon-btn gear-btn" onclick="openSettings()" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.04 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.67 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.04 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
    </button>
  </header>
  <form class="filters" id="log-form" novalidate
        hx-get="/api/logs"
        hx-trigger="load, submit, every 3s"
        hx-target="#log-body"
        hx-swap="innerHTML">
    <input name="since" id="filter-since" type="hidden">
    <input name="until" id="filter-until" type="hidden">
    <select name="host" id="filter-host"><option value="">All hosts</option></select>
    <select name="facility" id="filter-facility"><option value="">All facilities</option></select>
    <select name="severity" id="filter-severity"><option value="">All severities</option></select>
    <select name="tag" id="filter-tag"><option value="">All tags</option></select>
    <select id="time-preset">
      <option value="">All time</option>
      <option value="5" selected>Last 5 min</option>
      <option value="15">Last 15 min</option>
      <option value="60">Last 1 hour</option>
      <option value="360">Last 6 hours</option>
      <option value="1440">Last 24 hours</option>
      <option value="10080">Last 7 days</option>
      <option value="custom">Custom range</option>
    </select>
    <input id="filter-since-visible" type="datetime-local" style="display:none">
    <input id="filter-until-visible" type="datetime-local" style="display:none">
    <input name="search" placeholder="Search message..." autocomplete="off" style="flex:1;min-width:200px">
    <button type="submit" class="btn-filter">Filter</button>
    <button type="button" class="btn-reset" onclick="resetFilters()">Reset</button>
  </form>
  <table>
    <thead>
      <tr>
        <th style="width:150px">Time<span class="col-resize"></span></th>
        <th style="width:120px">Host<span class="col-resize"></span></th>
        <th style="width:80px">Facility<span class="col-resize"></span></th>
        <th style="width:80px">Severity<span class="col-resize"></span></th>
        <th style="width:100px">Tag<span class="col-resize"></span></th>
        <th>Message</th>
      </tr>
    </thead>
    <tbody id="log-body">
    </tbody>
  </table>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeSettings()" title="Close">&times;</button>
      <h2>Settings</h2>

      <h3>SMTP</h3>
      <div class="field-row">
        <div><label>Host</label><input id="cfg-smtp-host"></div>
        <div><label>Port</label><input id="cfg-smtp-port" type="number"></div>
      </div>
      <div class="field-row">
        <div><label>User</label><input id="cfg-smtp-user"></div>
        <div><label>Password</label><input id="cfg-smtp-password" type="password"></div>
      </div>
      <div class="field-row">
        <div><label>From</label><input id="cfg-smtp-from"></div>
        <div><label>To</label><input id="cfg-smtp-to"></div>
      </div>

      <h3>General</h3>
      <div class="field-row">
        <div><label>Retention (days)</label><input id="cfg-retention" type="number"></div>
        <div><label>Debug logging</label><div style="padding:6px 0 4px"><input id="cfg-debug" type="checkbox"></div></div>
      </div>

      <h3>Alert Rules</h3>
      <div id="alert-rules-container"></div>
      <button class="add-btn" onclick="addAlertRule()">+ Add alert rule</button>

      <h3>Ignore Rules</h3>
      <div id="ignore-rules-container"></div>
      <button class="add-btn" onclick="addIgnoreRule()">+ Add ignore rule</button>

      <h3>Severity Rewrite Rules</h3>
      <div id="severity-rewrite-container"></div>
      <button class="add-btn" onclick="addSeverityRewrite()">+ Add rewrite rule</button>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
        <button class="btn-save" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Format a Date as local time string matching go-sqlite3 format: "YYYY-MM-DD HH:MM:SS"
    function localTimeStr(d) {
      var p = function(n) { return String(n).padStart(2, '0'); };
      return d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate()) + ' ' +
             p(d.getHours()) + ':' + p(d.getMinutes()) + ':' + p(d.getSeconds());
    }

    // Pulse green dot on refresh
    document.body.addEventListener('htmx:beforeRequest', function() {
      var dot = document.getElementById('status-dot');
      dot.classList.remove('refreshing');
      void dot.offsetWidth; // force reflow to restart animation
      dot.classList.add('refreshing');
    });

    // Populate filter dropdowns from DB, filtered by current selections
    function loadFilters() {
      var params = new URLSearchParams();
      var host = document.getElementById('filter-host').value;
      var facility = document.getElementById('filter-facility').value;
      var severity = document.getElementById('filter-severity').value;
      var tag = document.getElementById('filter-tag').value;
      if (host) params.set('host', host);
      if (facility) params.set('facility', facility);
      if (severity) params.set('severity', severity);
      if (tag) params.set('tag', tag);
      fetch('/api/filters?' + params.toString())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          populateSelect('filter-host', data.hosts, 'All hosts');
          populateSelect('filter-facility', data.facilities, 'All facilities');
          populateSelect('filter-severity', data.severities, 'All severities');
          populateSelect('filter-tag', data.tags, 'All tags');
        })
        .catch(function() {});
    }

    function populateSelect(id, values, placeholder) {
      var sel = document.getElementById(id);
      var current = sel.value;
      sel.innerHTML = '<option value="">' + placeholder + '</option>';
      if (values) {
        values.forEach(function(v) {
          var opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          if (v === current) opt.selected = true;
          sel.appendChild(opt);
        });
      }
      if (current && !sel.value) {
        sel.value = '';
      }
    }

    // Refresh filter options every 30s and on dropdown change
    loadFilters();
    setInterval(loadFilters, 30000);

    // Dropdown changes trigger filter refresh and log reload
    ['filter-host', 'filter-facility', 'filter-severity', 'filter-tag', 'time-preset'].forEach(function(id) {
      document.getElementById(id).addEventListener('change', function() {
        if (id === 'time-preset') {
          handleTimePreset(this.value);
        }
        loadFilters();
        htmx.trigger(document.getElementById('log-form'), 'submit');
      });
    });

    // Visible datetime-local inputs sync to hidden inputs
    document.getElementById('filter-since-visible').addEventListener('change', function() {
      document.getElementById('filter-since').value = this.value ? this.value.replace('T', ' ') : '';
    });
    document.getElementById('filter-until-visible').addEventListener('change', function() {
      document.getElementById('filter-until').value = this.value ? this.value.replace('T', ' ') : '';
    });

    // Time filter
    function handleTimePreset(val) {
      var sinceH = document.getElementById('filter-since');
      var untilH = document.getElementById('filter-until');
      var sinceV = document.getElementById('filter-since-visible');
      var untilV = document.getElementById('filter-until-visible');
      if (val === 'custom') {
        sinceV.style.display = '';
        untilV.style.display = '';
        sinceH.value = '';
        untilH.value = '';
        sinceV.value = '';
        untilV.value = '';
      } else {
        sinceV.style.display = 'none';
        untilV.style.display = 'none';
        sinceV.value = '';
        untilV.value = '';
        untilH.value = '';
        if (val) {
          sinceH.value = localTimeStr(new Date(Date.now() - parseInt(val) * 60000));
        } else {
          sinceH.value = '';
        }
      }
    }

    // Update relative time before each HTMX request
    document.body.addEventListener('htmx:configRequest', function(e) {
      var preset = document.getElementById('time-preset').value;
      if (preset && preset !== 'custom') {
        e.detail.parameters.since = localTimeStr(new Date(Date.now() - parseInt(preset) * 60000));
        delete e.detail.parameters.until;
      } else if (preset === 'custom') {
        // Normalize T separator to space for custom inputs
        if (e.detail.parameters.since) {
          e.detail.parameters.since = e.detail.parameters.since.replace('T', ' ');
        }
        if (e.detail.parameters.until) {
          e.detail.parameters.until = e.detail.parameters.until.replace('T', ' ');
        }
      }
    });

    // Reset all filters to defaults
    function resetFilters() {
      document.getElementById('filter-host').value = '';
      document.getElementById('filter-facility').value = '';
      document.getElementById('filter-severity').value = '';
      document.getElementById('filter-tag').value = '';
      document.getElementById('time-preset').value = '5';
      document.querySelector('input[name="search"]').value = '';
      handleTimePreset('5');
      loadFilters();
      htmx.trigger(document.getElementById('log-form'), 'submit');
    }

    // Settings modal
    let currentConfig = null;

    function openSettings() {
      fetch('/api/config')
        .then(function(r) { return r.json(); })
        .then(function(cfg) {
          currentConfig = cfg;
          document.getElementById('cfg-smtp-host').value = cfg.smtp.host || '';
          document.getElementById('cfg-smtp-port').value = cfg.smtp.port || 587;
          document.getElementById('cfg-smtp-user').value = cfg.smtp.user || '';
          document.getElementById('cfg-smtp-password').value = cfg.smtp.password || '';
          document.getElementById('cfg-smtp-from').value = cfg.smtp.from || '';
          document.getElementById('cfg-smtp-to').value = cfg.smtp.to || '';
          document.getElementById('cfg-retention').value = cfg.retention || 14;
          document.getElementById('cfg-debug').checked = cfg.debug || false;
          renderAlertRules(cfg.alerts || []);
          renderIgnoreRules(cfg.ignore || []);
          renderSeverityRewrites(cfg.severity_rewrite || []);
          document.getElementById('settings-modal').classList.add('open');
        });
    }

    function closeSettings() {
      document.getElementById('settings-modal').classList.remove('open');
    }

    // Close modal on overlay click or Escape key
    document.getElementById('settings-modal').addEventListener('click', function(e) {
      if (e.target === this) closeSettings();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSettings();
    });

    function renderAlertRules(rules) {
      var c = document.getElementById('alert-rules-container');
      c.innerHTML = '';
      rules.forEach(function(r, i) { addAlertRuleDOM(r, i); });
    }

    function addAlertRule() {
      addAlertRuleDOM({name:'', count:1, window_minutes:5, level:'err', above:false, host:'', facility:'', tag:'', message:''});
    }

    function addAlertRuleDOM(r) {
      var c = document.getElementById('alert-rules-container');
      var div = document.createElement('div');
      div.className = 'rule-group';
      div.innerHTML = '<button class="remove-btn" onclick="this.parentElement.remove()">&times;</button>' +
        '<div class="field-row">' +
        '<div><label>Name</label><input class="ar-name" value="' + esc(r.name) + '"></div>' +
        '<div><label>Level</label><select class="ar-level">' + severityOptions(r.level) + '</select></div>' +
        '<div><label>&amp; above</label><div style="padding:6px 0 4px"><input class="ar-above" type="checkbox"' + (r.above ? ' checked' : '') + '></div></div>' +
        '</div>' +
        '<div class="field-row">' +
        '<div><label>Count</label><input class="ar-count" type="number" value="' + (r.count||1) + '"></div>' +
        '<div><label>Window (min)</label><input class="ar-window" type="number" value="' + (r.window_minutes||5) + '"></div>' +
        '</div>' +
        '<div class="field-row">' +
        '<div><label>Host</label><input class="ar-host" value="' + esc(r.host) + '" placeholder="optional"></div>' +
        '<div><label>Facility</label><input class="ar-facility" value="' + esc(r.facility) + '" placeholder="optional"></div>' +
        '<div><label>Tag</label><input class="ar-tag" value="' + esc(r.tag) + '" placeholder="optional"></div>' +
        '</div>' +
        '<label>Message (regex)</label><input class="ar-message" value="' + esc(r.message) + '" placeholder="optional, e.g. disk.*full">';
      c.appendChild(div);
    }

    function renderIgnoreRules(rules) {
      var c = document.getElementById('ignore-rules-container');
      c.innerHTML = '';
      rules.forEach(function(r, i) { addIgnoreRuleDOM(r, i); });
    }

    function addIgnoreRule() {
      addIgnoreRuleDOM({host:'', facility:'', tag:'', level:'', message:'', discard:false});
    }

    function addIgnoreRuleDOM(r) {
      var c = document.getElementById('ignore-rules-container');
      var div = document.createElement('div');
      div.className = 'rule-group';
      div.innerHTML = '<button class="remove-btn" onclick="this.parentElement.remove()">&times;</button>' +
        '<div class="field-row">' +
        '<div><label>Host</label><input class="ir-host" value="' + esc(r.host) + '"></div>' +
        '<div><label>Facility</label><input class="ir-facility" value="' + esc(r.facility) + '"></div>' +
        '<div><label>Tag</label><input class="ir-tag" value="' + esc(r.tag) + '"></div>' +
        '<div><label>Level</label><select class="ir-level"><option value="">Any</option>' + severityOptions(r.level) + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
        '<div style="flex:1"><label>Message (regex)</label><input class="ir-message" value="' + esc(r.message) + '" placeholder="e.g. CRON|systemd-.*"></div>' +
        '<div><label>Discard log</label><div style="padding:6px 0 4px"><input class="ir-discard" type="checkbox"' + (r.discard ? ' checked' : '') + '></div></div>' +
        '</div>';
      c.appendChild(div);
    }

    function renderSeverityRewrites(rules) {
      var c = document.getElementById('severity-rewrite-container');
      c.innerHTML = '';
      rules.forEach(function(r, i) { addSeverityRewriteDOM(r, i); });
    }

    function addSeverityRewrite() {
      addSeverityRewriteDOM({host:'', facility:'', tag:'', level:'', message:'', new_severity:'err'});
    }

    function addSeverityRewriteDOM(r) {
      var c = document.getElementById('severity-rewrite-container');
      var div = document.createElement('div');
      div.className = 'rule-group';
      div.innerHTML = '<button class="remove-btn" onclick="this.parentElement.remove()">&times;</button>' +
        '<div class="field-row">' +
        '<div><label>Host</label><input class="sr-host" value="' + esc(r.host) + '" placeholder="optional"></div>' +
        '<div><label>Facility</label><input class="sr-facility" value="' + esc(r.facility) + '" placeholder="optional"></div>' +
        '<div><label>Tag</label><input class="sr-tag" value="' + esc(r.tag) + '" placeholder="optional"></div>' +
        '<div><label>Level</label><select class="sr-level"><option value="">Any</option>' + severityOptions(r.level) + '</select></div>' +
        '</div>' +
        '<div class="field-row">' +
        '<div style="flex:1"><label>Message (regex)</label><input class="sr-message" value="' + esc(r.message) + '" placeholder="e.g. ERROR|FATAL"></div>' +
        '<div><label>New severity</label><select class="sr-new-severity">' + severityOptions(r.new_severity) + '</select></div>' +
        '</div>';
      c.appendChild(div);
    }

    function severityOptions(selected) {
      var levels = ['emerg','alert','crit','err','warning','notice','info','debug'];
      return levels.map(function(l) { return '<option value="'+l+'"'+(l===selected?' selected':'')+'>'+l+'</option>'; }).join('');
    }

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    }

    function saveSettings() {
      var errors = [];

      var retention = parseInt(document.getElementById('cfg-retention').value);
      if (!retention || retention < 1) errors.push('Retention must be at least 1 day.');

      var alerts = [];
      document.querySelectorAll('#alert-rules-container .rule-group').forEach(function(g, i) {
        var name = g.querySelector('.ar-name').value;
        var count = parseInt(g.querySelector('.ar-count').value);
        var window = parseInt(g.querySelector('.ar-window').value);
        var message = g.querySelector('.ar-message').value;
        if (!name) errors.push('Alert rule ' + (i+1) + ': name is required.');
        if (!count || count < 1) errors.push('Alert rule "' + (name||i+1) + '": count must be at least 1.');
        if (!window || window < 1) errors.push('Alert rule "' + (name||i+1) + '": window must be at least 1 minute.');
        if (message) {
          try { new RegExp(message); }
          catch(e) { errors.push('Alert rule "' + (name||i+1) + '": invalid message regex.'); }
        }
        alerts.push({
          name: name,
          count: count || 1,
          window_minutes: window || 5,
          level: g.querySelector('.ar-level').value,
          above: g.querySelector('.ar-above').checked,
          host: g.querySelector('.ar-host').value,
          facility: g.querySelector('.ar-facility').value,
          tag: g.querySelector('.ar-tag').value,
          message: message
        });
      });

      var ignore = [];
      document.querySelectorAll('#ignore-rules-container .rule-group').forEach(function(g, i) {
        var rule = {
          host: g.querySelector('.ir-host').value,
          facility: g.querySelector('.ir-facility').value,
          tag: g.querySelector('.ir-tag').value,
          level: g.querySelector('.ir-level').value,
          message: g.querySelector('.ir-message').value,
          discard: g.querySelector('.ir-discard').checked
        };
        if (rule.message) {
          try { new RegExp(rule.message); }
          catch(e) { errors.push('Ignore rule ' + (i+1) + ': invalid message regex.'); }
        }
        if (rule.host || rule.facility || rule.tag || rule.level || rule.message) ignore.push(rule);
      });

      var severity_rewrite = [];
      document.querySelectorAll('#severity-rewrite-container .rule-group').forEach(function(g, i) {
        var rule = {
          host: g.querySelector('.sr-host').value,
          facility: g.querySelector('.sr-facility').value,
          tag: g.querySelector('.sr-tag').value,
          level: g.querySelector('.sr-level').value,
          message: g.querySelector('.sr-message').value,
          new_severity: g.querySelector('.sr-new-severity').value
        };
        if (!rule.new_severity) errors.push('Severity rewrite rule ' + (i+1) + ': new severity is required.');
        if (!rule.host && !rule.facility && !rule.tag && !rule.level && !rule.message) errors.push('Severity rewrite rule ' + (i+1) + ': at least one match field is required.');
        if (rule.message) {
          try { new RegExp(rule.message); }
          catch(e) { errors.push('Severity rewrite rule ' + (i+1) + ': invalid message regex.'); }
        }
        severity_rewrite.push(rule);
      });

      if (errors.length > 0) { alert(errors.join('\n')); return; }

      var cfg = {
        smtp: {
          host: document.getElementById('cfg-smtp-host').value,
          port: parseInt(document.getElementById('cfg-smtp-port').value) || 587,
          user: document.getElementById('cfg-smtp-user').value,
          password: document.getElementById('cfg-smtp-password').value,
          from: document.getElementById('cfg-smtp-from').value,
          to: document.getElementById('cfg-smtp-to').value
        },
        alerts: alerts,
        ignore: ignore,
        severity_rewrite: severity_rewrite,
        retention: retention || 14,
        debug: document.getElementById('cfg-debug').checked
      };

      fetch('/api/config', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(cfg)
      })
      .then(function(r) {
        if (!r.ok) return r.text().then(function(t) { throw new Error(t); });
        closeSettings();
      })
      .catch(function(err) { alert('Save failed: ' + err.message); });
    }

    // Column resize
    document.querySelectorAll('.col-resize').forEach(function(handle) {
      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        var th = this.parentElement;
        var startX = e.pageX;
        var startW = th.offsetWidth;
        this.classList.add('active');
        function onMove(e) {
          th.style.width = Math.max(40, startW + e.pageX - startX) + 'px';
        }
        function onUp() {
          handle.classList.remove('active');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  </script>
</body>
</html>
