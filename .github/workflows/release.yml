name: Release

on:
  release:
    types: [published]

jobs:
  Setup:
    runs-on: ubuntu-24.04
    outputs:
      build_matrix: ${{ steps.set-matrix.outputs.build_matrix }}
      version: ${{ steps.set-matrix.outputs.version }}
      repo_name_lower_case: ${{ steps.set-matrix.outputs.repo_name_lower_case }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup
      id: set-matrix
      run: |
        echo "build_matrix=$(jq -c . .github/platforms.json)" >> $GITHUB_OUTPUT
        echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        echo "repo_name_lower_case=$(echo ${GITHUB_REPOSITORY@L} | cut -d'/' -f2)" >> $GITHUB_OUTPUT

  Go-Binaries:
    runs-on: ubuntu-24.04
    needs: Setup
    env:
      VERSION: ${{ needs.Setup.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.25"

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: "1"
      run: |
        if [[ "$GOARCH" == "arm64" ]]; then
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          export CC=aarch64-linux-gnu-gcc
        fi
        go build -ldflags="-s -w" -o logyard-${GOOS}-${GOARCH} .
        tar czf logyard-${GOOS}-${GOARCH}.tar.gz logyard-${GOOS}-${GOARCH}

    - name: Upload release asset
      run: gh release upload ${{ env.VERSION }} logyard-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Docker-Build:
    runs-on: ${{ matrix.runner }}
    needs: Setup
    env:
      VERSION: ${{ needs.Setup.outputs.version }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || needs.Setup.outputs.repo_name_lower_case }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.Setup.outputs.build_matrix) }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build
      env:
        DOCKER_USER: ${{ vars.DOCKER_HUB_USERNAME || github.repository_owner }}
        BUILD_NR: ${{ github.run_number }}
        PLATFORM: ${{ matrix.platform }}
      run: |
        ARCH=$(echo "${PLATFORM}" | awk -F  "/" '{print $2$3}')
        echo ""
        echo "============================================================="
        echo "Building: ${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}-${BUILD_NR}"
        echo "============================================================="
        echo ""
        docker buildx build \
          --tag "${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}-${BUILD_NR}" \
          --platform ${PLATFORM} \
          --load \
          -f Dockerfile .

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_HUB_USERNAME || github.repository_owner }}
        password: ${{ secrets.DOCKER_HUB_DEPLOY_KEY }}

    - name: Push Images
      env:
        DOCKER_USER: ${{ vars.DOCKER_HUB_USERNAME || github.repository_owner }}
        BUILD_NR: ${{ github.run_number }}
        PLATFORM: ${{ matrix.platform }}
      run: |
        ARCH=$(echo "${PLATFORM}" | awk -F  "/" '{print $2$3}')
        docker tag "${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}-${BUILD_NR}" "${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}"
        docker push "${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}-${BUILD_NR}"
        docker push "${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}"

  Shared-Manifest:
    runs-on: ubuntu-24.04
    needs:
      - Docker-Build
      - Setup
    env:
      VERSION: ${{ needs.Setup.outputs.version }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || needs.Setup.outputs.repo_name_lower_case }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKER_HUB_USERNAME || github.repository_owner }}
        password: ${{ secrets.DOCKER_HUB_DEPLOY_KEY }}

    - name: Create and push shared manifest
      env:
        DOCKER_USER: ${{ vars.DOCKER_HUB_USERNAME || github.repository_owner }}
        BUILD_NR: ${{ github.run_number }}
      run: |
        echo "#!/bin/bash" > push-shared-tags.sh
        echo -n "docker manifest create ${DOCKER_USER}/${IMAGE_NAME}:${VERSION}" >> push-shared-tags.sh
        while read -r PLATFORM; do
          ARCH=$(echo "${PLATFORM}" | awk -F "/" '{print $2}')
          echo -n " ${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}-${BUILD_NR}" >> push-shared-tags.sh
        done <<< "$(jq -r '.include[].platform' .github/platforms.json)"
        echo "" >> push-shared-tags.sh

        echo -n "docker manifest create ${DOCKER_USER}/${IMAGE_NAME}:latest" >> push-shared-tags.sh
        while read -r PLATFORM; do
          ARCH=$(echo "${PLATFORM}" | awk -F "/" '{print $2}')
          echo -n " ${DOCKER_USER}/${IMAGE_NAME}:${VERSION}-${ARCH}-${BUILD_NR}" >> push-shared-tags.sh
        done <<< "$(jq -r '.include[].platform' .github/platforms.json)"
        echo "" >> push-shared-tags.sh

        echo "docker manifest push ${DOCKER_USER}/${IMAGE_NAME}:${VERSION}" >> push-shared-tags.sh
        echo "docker manifest push ${DOCKER_USER}/${IMAGE_NAME}:latest" >> push-shared-tags.sh
        cat push-shared-tags.sh
        chmod +x ./push-shared-tags.sh
        ./push-shared-tags.sh

  Check-Release:
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    needs:
      - Go-Binaries
      - Docker-Build
      - Shared-Manifest
    steps:
      - run: |
          result_go="${{ needs.Go-Binaries.result }}"
          result_docker="${{ needs.Docker-Build.result }}"
          if [[ $result_go == "success" && $result_docker == "success" ]]; then
            exit 0
          else
            exit 1
          fi
