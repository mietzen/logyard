name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  Go-Binaries:
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "1.26"

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: "1"
      run: |
        if [[ "$GOARCH" == "arm64" ]]; then
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          export CC=aarch64-linux-gnu-gcc
        fi
        go build -ldflags="-s -w -X main.version=${VERSION#v}" -o logyard .
        tar czf logyard-${GOOS}-${GOARCH}.tar.gz logyard

    - name: Upload release asset
      run: gh release upload ${{ env.VERSION }} logyard-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Check-Release:
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    needs:
      - Go-Binaries
    steps:
      - run: |
          if [[ "${{ needs.Go-Binaries.result }}" != "success" ]]; then
            exit 1
          fi
